<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献立アプリ（離乳食対応）</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  padding: 16px 16px 90px;
  background: #f4f6f8;
}
h1 { font-size: 22px; }
input, textarea, select { width: 100%; padding: 12px; margin: 6px 0 16px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; }
button { position: fixed; bottom: 20px; left: 16px; right: 16px; padding: 16px; font-size: 16px; border: none; border-radius: 16px; background: #2e7d32; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
.card { background: white; padding: 14px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 3px 8px rgba(0,0,0,0.05); }
.warn { color: red; font-size: 13px; }
.small { font-size: 13px; color: gray; }
.accordion { cursor: pointer; background: #eee; padding: 8px; border-radius: 8px; margin-top: 6px; }
.panel { padding: 0 8px; display: none; background-color: #f9f9f9; border-radius: 8px; margin-bottom: 8px; }
</style>
</head>
<body>

<h1>🍚 1週間献立（離乳食対応）</h1>

<label>👶 離乳食フェーズ</label>
<select id="phase">
  <option value="初期">初期</option>
  <option value="中期">中期</option>
  <option value="後期" selected>後期</option>
  <option value="完了期">完了期</option>
</select>

<label>🥬 常備食材（カンマ区切り）</label>
<textarea id="stock" rows="2" placeholder="豚こま, 鶏むね, 玉ねぎ"></textarea>

<label>🍳 メニューと食材（形式：料理名｜食材1,食材2）</label>
<textarea id="recipes" rows="7">
豚こま炒め｜豚こま,玉ねぎ,きのこ
鶏照り焼き｜鶏むね,小松菜,醤油,みりん,砂糖
サバ味噌煮｜サバ,味噌,生姜
きのこパスタ｜パスタ,きのこ,玉ねぎ
チキン南蛮｜鶏むね,卵,酢,片栗粉,にんじん,ピーマン,玉ねぎ,お酢
豚キムチ｜豚こま,キムチ
親子丼｜鶏むね,卵,玉ねぎ
小松菜炒飯｜小松菜,鶏むね,ねぎ,卵,醤油
オムライス｜卵,玉ねぎ,にんじん,ピーマン,鶏むね,バター,ケチャップ
</textarea>

<button onclick="generate()">献立生成</button>

<div id="result"></div>

<script>
/* 👶 離乳食フェーズ別許可食材 */
const allowedFoods = {
  初期: ["米","食パン","ロールパン","うどん","そうめん","じゃがいも","さつまいも","豆腐","お麩","きなこ","卵の黄身","ヨーグルト","白身魚","しらす","にんじん","大根","かぶ","とまと","とうもろこし","かぼちゃ","きゅうり","なす","小松菜","ほうれん草","白菜","キャベツ","ブロッコリー","カリフラワー","レタス","ちんげん菜","玉ねぎ","りんご","いちご","メロン","バナナ","すいか","梨","みかん","桃","片栗粉"],
  中期: ["米","食パン","ロールパン","うどん","そうめん","じゃがいも","さつまいも","豆腐","お麩","きなこ","卵の黄身","ヨーグルト","白身魚","しらす","にんじん","大根","かぶ","とまと","とうもろこし","かぼちゃ","きゅうり","なす","小松菜","ほうれん草","白菜","キャベツ","ブロッコリー","カリフラワー","レタス","ちんげん菜","玉ねぎ","りんご","いちご","メロン","バナナ","すいか","梨","みかん","桃","片栗粉","コーンフレーク","パスタ","里芋","山芋","納豆","高野豆腐","粉チーズ","鮭","かつお","ぶり","まぐろ","めかじき","削り節","鶏ささみ","鶏ひき","鶏もも","鶏むね","鶏レバ","豚レバ","牛レバ","ツナ水煮","おくら","えんどう","ズッキーニ","インゲン","パプリカ","ピーマン","アスパラ","ねぎ","にら","キウイ","ぶどう","焼き海苔","青のり","砂糖","バター","マーガリン","サラダ油","ごま油","オリーブオイル"],
  後期: ["米","食パン","ロールパン","うどん","そうめん","じゃがいも","さつまいも","豆腐","お麩","きなこ","卵の黄身","ヨーグルト","白身魚","しらす","にんじん","大根","かぶ","とまと","とうもろこし","かぼちゃ","きゅうり","なす","小松菜","ほうれん草","白菜","キャベツ","ブロッコリー","カリフラワー","レタス","ちんげん菜","玉ねぎ","りんご","いちご","メロン","バナナ","すいか","梨","みかん","桃","片栗粉","コーンフレーク","パスタ","里芋","山芋","納豆","高野豆腐","粉チーズ","鮭","かつお","ぶり","まぐろ","めかじき","削り節","鶏ささみ","鶏ひき","鶏もも","鶏むね","鶏レバ","豚レバ","牛レバ","ツナ水煮","おくら","えんどう","ズッキーニ","インゲン","パプリカ","ピーマン","アスパラ","ねぎ","にら","キウイ","ぶどう","焼き海苔","青のり","砂糖","バター","マーガリン","サラダ油","ごま油","オリーブオイル","ホットケーキミックス","バゲット","胚芽入りパン","イングリッシュマフィン","中華麺","プロセスチーズ","あじ","さば","いわし","さわら","金目鯛","さんま","銀鱈","かき","えび","かに","豚ひき","豚もも","豚ロース","牛ひき","牛赤身","ごぼう","れんこん","ゴーヤ","もやし","しそ","きのこ","グレープフルーツ","アボカド","ブルーベリー","ラズベリー","寒天","めかぶ","もずく","ひじき","切干大根","味噌","みりん","マヨネーズ","パン粉","しょうゆ","塩"],
  完了期: ["米","食パン","ロールパン","うどん","そうめん","じゃがいも","さつまいも","豆腐","お麩","きなこ","卵の黄身","ヨーグルト","白身魚","しらす","にんじん","大根","かぶ","とまと","とうもろこし","かぼちゃ","きゅうり","なす","小松菜","ほうれん草","白菜","キャベツ","ブロッコリー","カリフラワー","レタス","ちんげん菜","玉ねぎ","りんご","いちご","メロン","バナナ","すいか","梨","みかん","桃","片栗粉","コーンフレーク","パスタ","里芋","山芋","納豆","高野豆腐","粉チーズ","鮭","かつお","ぶり","まぐろ","めかじき","削り節","鶏ささみ","鶏ひき","鶏もも","鶏むね","鶏レバ","豚レバ","牛レバ","ツナ水煮","おくら","えんどう","ズッキーニ","インゲン","パプリカ","ピーマン","アスパラ","ねぎ","にら","キウイ","ぶどう","焼き海苔","青のり","砂糖","バター","マーガリン","サラダ油","ごま油","オリーブオイル","ホットケーキミックス","バゲット","胚芽入りパン","イングリッシュマフィン","中華麺","プロセスチーズ","あじ","さば","いわし","さわら","金目鯛","さんま","銀鱈","かき","えび","かに","豚ひき","豚もも","豚ロース","牛ひき","牛赤身","ごぼう","れんこん","ゴーヤ","もやし","しそ","きのこ","グレープフルーツ","アボカド","ブルーベリー","ラズベリー","寒天","めかぶ","もずく","ひじき","切干大根","味噌","みりん","マヨネーズ","パン粉","しょうゆ","塩","玄米","ライ麦パン","蒸しパン","ナン","グラノーラ","油揚げ","厚揚げ","おから","がんも","生クリーム","あさりしじみ","たらこ","練り物","干物","ハム","ウインナー","焼き豚","栗","たけのこ","貝割れ大根","マッシュルーム","パイン","なめこ","味のり","ウスターソース","ケチャップ","カレー粉","大人出汁","鶏ガラ","コンソメ","オイスターソース"]
};

/* 🍳 補助関数 */
function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }
function babyGuide(phase){
  switch(phase){
    case "初期": return "すりつぶしてペースト状";
    case "中期": return "5mm角でやわらかく";
    case "後期": return "1cm角・薄味取り分け";
    case "完了期": return "ほぼ大人と同じ薄味";
  }
}
function ngCheck(phase, ingredients){
  if(phase==="完了期") return [];
  return ingredients.filter(i => !allowedFoods[phase].includes(i));
}

/* 🍳 生成処理 */
function generate(){
  const phase = document.getElementById("phase").value;
  const stock = document.getElementById("stock").value.split(",").map(s=>s.trim()).filter(Boolean);
  const stockSet = new Set(stock); // 常備菜セット
  const raw = document.getElementById("recipes").value.split("\n").map(r=>r.trim()).filter(Boolean);
  if(raw.length<7){ alert("7メニュー以上入力してね！"); return; }

  const shuffled = shuffle([...raw]);
  const days=["月","火","水","木","金","土","日"];
  let html="", shopping=new Set();

  shuffled.slice(0,7).forEach((line,i)=>{
    const [name, ingStr] = line.split("｜");
    const ingredients = ingStr.split(",").map(s=>s.trim());
    const ng = ngCheck(phase, ingredients);

    html+=`<div class="card">
      <strong>${days[i]}曜日</strong><br>
      🍽 ${name}<br>
      👶 ${babyGuide(phase)}
    `;

    if(ng.length>0) html+=`<div class="warn">⚠ NG食材: ${ng.join(",")}</div>`;

    // アコーディオン材料リスト
    html+=`<div class="accordion">材料・調味料</div>
           <div class="panel">${ingredients.join(", ")}</div>
    </div>`;

    // 買い物リスト（常備菜とNG食材除外）
    ingredients.forEach(i=>{
      if(!stockSet.has(i) && allowedFoods[phase].includes(i)){
        shopping.add(i);
      }
    });
  });

  html+=`<div class="card"><strong>🛒 買い物リスト</strong><br>`;
  shopping.forEach(i=>{ html+=`・${i}<br>`; });
  html+="</div>";

  document.getElementById("result").innerHTML=html;

  // アコーディオン動作
  const acc = document.getElementsByClassName("accordion");
  for(let j=0;j<acc.length;j++){
    acc[j].onclick=function(){
      this.classList.toggle("active");
      const panel=this.nextElementSibling;
      panel.style.display=(panel.style.display==="block")?"none":"block";
    }
  }
}
</script>
</body>
</html>
