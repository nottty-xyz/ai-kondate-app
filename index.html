<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>1週間献立アプリ</title>
<style>
body { font-family: sans-serif; padding: 20px; }
button { padding: 10px 20px; margin: 10px 0; }
.card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
details { margin-top: 5px; }
</style>
</head>
<body>

<h1>🍚 1週間夕飯献立</h1>
<button onclick="generate()">献立を作る</button>
<div id="result"></div>

<script>

const mains = [
"豚こまと玉ねぎの甘辛炒め",
"鶏むねの照り焼き",
"サバの味噌煮",
"きのこたっぷり和風パスタ",
"小松菜と豚肉のオイスター炒め",
"鶏むねのチキン南蛮風",
"サバの塩焼き"
];

const sides = [
"小松菜のおひたし",
"きのこスープ",
"玉ねぎ味噌汁",
"ポテトサラダ",
"冷ややっこ",
"人参しりしり",
"ほうれん草ごま和え"
];

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function generate() {
  const days = ["月","火","水","木","金","土","日"];
  const shuffledMains = shuffle([...mains]);
  const shuffledSides = shuffle([...sides]);

  let html = "";
  let shopping = new Set();

  days.forEach((day, i) => {
    const main = shuffledMains[i % mains.length];
    const side = shuffledSides[i % sides.length];

    shopping.add(main);
    shopping.add(side);

    html += `
      <div class="card">
        <strong>${day}曜日</strong><br>
        メイン：${main}<br>
        副菜：${side}

        <details>
          <summary>ざっくりレシピを見る</summary>
          フライパンで炒めて味付けするだけ。<br>
          離乳食は薄味に取り分けて刻む。
        </details>
      </div>
    `;
  });

  html += `<h3>🛒 買い物メモ</h3>`;
  shopping.forEach(item => {
    html += `・${item}<br>`;
  });

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
