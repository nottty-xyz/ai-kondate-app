<script>

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function babyGuide(phase){
  switch(phase){
    case "初期": return "すりつぶしてペースト状";
    case "中期": return "5mm角でやわらかく";
    case "後期": return "1cm角・薄味取り分け";
    case "完了期": return "ほぼ大人と同じ薄味";
  }
}

function ngCheck(phase, ingredients){
  const ngFoods = {
    初期:["塩","醤油","味噌","はちみつ"],
    中期:["はちみつ"],
    後期:["はちみつ"],
    完了期:[]
  };
  return ingredients.filter(i => ngFoods[phase].includes(i));
}

/* 🛒 食材価格 */
const priceTable = {
  豚こま:300,
  鶏むね:250,
  サバ:300,
  玉ねぎ:100,
  小松菜:150,
  卵:250,
  パスタ:200,
  きのこ:200,
  ベーコン:300,
  味噌:200,
  醤油:150,
  みりん:150,
  塩:50,
  生姜:100,
  酢:150
};

function calcCost(ingredients, stock){
  let cost=0;
  ingredients.forEach(i=>{
    if(!stock.includes(i)){
      cost += priceTable[i] || 200;
    }
  });
  return cost;
}

function generate(){

  const phase = document.getElementById("phase").value;
  const budget = Number(document.getElementById("budget").value);
  const stock = document.getElementById("stock").value
    .split(",").map(s=>s.trim()).filter(Boolean);

  const raw = document.getElementById("recipes").value
    .split("\n").map(r=>r.trim()).filter(Boolean);

  if(raw.length < 7){
    alert("7メニュー以上入れてね！");
    return;
  }

  /* 各メニューのコスト計算 */
  let menus = raw.map(line=>{
    const [name, ingStr] = line.split("｜");
    const ingredients = ingStr.split(",").map(s=>s.trim());
    const cost = calcCost(ingredients, stock);
    return {name, ingredients, cost};
  });

  /* 安い順に並び替え */
  menus.sort((a,b)=>a.cost-b.cost);

  let selected=[];
  let total=0;

  for(let menu of menus){
    if(selected.length<7){
      if(!budget || total+menu.cost<=budget){
        selected.push(menu);
        total+=menu.cost;
      }
    }
  }

  /* 足りなかったら安い順で埋める（予算無視） */
  while(selected.length<7){
    selected.push(menus[selected.length]);
  }

  const days=["月","火","水","木","金","土","日"];
  let html="";
  let shopping=new Set();

  selected.forEach((menu,i)=>{

    html+=`<div class="card">
      <strong>${days[i]}曜日</strong><br>
      🍽 ${menu.name}<br>
      👶 ${babyGuide(phase)}<br>
      💰 約${menu.cost}円`;

    const ng = ngCheck(phase, menu.ingredients);
    if(ng.length>0){
      html+=`<div class="warn">⚠ NG食材: ${ng.join(",")}</div>`;
    }

    html+=`</div>`;

    menu.ingredients.forEach(i=>{
      if(!stock.includes(i)){
        shopping.add(i);
      }
    });
  });

  html+=`<div class="card"><strong>🛒 買い物リスト</strong><br>`;
  shopping.forEach(i=>{
    html+=`・${i}<br>`;
  });
  html+=`<br><strong>合計目安：${total}円</strong>`;

  if(budget){
    if(total>budget){
      html+=`<div class="warn">⚠ 完全には収まりませんでした</div>`;
    } else {
      html+=`<div style="color:green;">✔ 予算内に自動調整済み</div>`;
    }
  }

  html+=`</div>`;

  document.getElementById("result").innerHTML=html;
}

</script>
